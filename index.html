<!doctype html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forza Engine Studio</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>
  <body>
    <main class="app">
      <!-- ① 顶部主功能区 -->
      <header class="topbar">
        <div class="controls">
          <label class="field">目标形状数
            <input id="stop-at" type="number" value="3000" min="50" max="8000" step="50" />
          </label>
          <label class="field">画布宽
            <input id="canvas-w" type="number" value="1000" min="200" max="4096" step="50" />
          </label>
          <label class="field">画布高
            <input id="canvas-h" type="number" value="1000" min="200" max="4096" step="50" />
          </label>
          <label class="field">渲染模式
            <select id="sticker-mode">
              <option value="sticker">贴纸模式（保留透明度）</option>
              <option value="default" selected>默认模式</option>
            </select>
          </label>
          <label class="field" id="bg-color-field" title="默认模式下画布缓冲区（图片四周到 W×H）的填充色；贴纸模式保留透明">背景色
            <input id="bg-color" type="color" value="#ffffff" />
          </label>
          <label class="field">计算后端
            <select id="backend-select">
              <option value="gpu" selected>GPU（默认）</option>
              <option value="cpu">CPU</option>
              <option value="auto">自动</option>
            </select>
          </label>
          <label class="field" title="用图像模型协助渲染：压平色块 + 底图打底 + 显著性引导，更少图层、更高精细度">模型协助
            <select id="assist-mode">
              <option value="off" selected>关闭</option>
              <option value="on">开启（减少图层 · 增精细度）</option>
            </select>
          </label>
          <span id="backend" class="backend"></span>
          <span class="spacer"></span>
          <button id="import-json-btn" class="btn">导入 JSON</button>
          <button id="start-btn" class="btn primary" disabled>开始渲染</button>
        </div>
        <div class="progress-wrap">
          <div class="progress"><div id="bar" class="bar"></div></div>
          <div id="progress-label" class="progress-label">0 / 0 形状</div>
        </div>
      </header>

      <div class="body">
        <!-- ② 左侧面板（宽度可拖动，最小 20%） -->
        <section class="left">
          <!-- ③ 上：候选条（原图 + 每次 AI 结果）+ 目标图 -->
          <div class="images">
            <div id="candidates" class="candidates" aria-label="候选图：原图与 AI 处理结果"></div>
            <figure class="target-fig">
              <div class="target"><img id="target-img" alt="目标图" /></div>
            </figure>
          </div>

          <!-- ④ 下：AI 预处理 -->
          <div class="ai-block">
            <div class="composer">
              <textarea id="ai-prompt" rows="3" placeholder="处理指令，如：转成卡通风格"></textarea>
              <button id="ai-btn" class="entbtn" aria-label="发送（AI 处理图像）" title="发送（Enter）" disabled>↵</button>
            </div>
            <div class="model-row">
              <button id="model-trigger" class="modeltrig" aria-haspopup="true" aria-expanded="false">
                <span id="model-label">gemini-3.1-flash-image</span><span class="caret">▾</span>
              </button>
            </div>
            <div id="model-pop" class="pop" hidden>
              <label class="field">API Key
                <input id="ai-key" type="password" placeholder="sk-..." class="inp" />
              </label>
              <div class="pop-div"></div>
              <div class="pop-head">模型</div>
              <div class="pop-list">
                <button class="popitem is-selected" data-model="gemini-3.1-flash-image"><span class="tick">✓</span><span class="popname">gemini-3.1-flash-image</span><span class="kbd">1</span></button>
                <button class="popitem" data-model="plus/gpt-image-2"><span class="tick">✓</span><span class="popname">plus/gpt-image-2</span><span class="kbd">2</span></button>
                <button class="popitem" data-model="grok-imagine-image-lite"><span class="tick">✓</span><span class="popname">grok-imagine-image-lite</span><span class="kbd">3</span></button>
              </div>
            </div>
          </div>
        </section>

        <!-- 可拖动分隔条 -->
        <div class="splitter" id="splitter" role="separator" aria-orientation="vertical" aria-label="拖动调整左右面板宽度">
          <span class="splitter-handle">
            <svg width="12" height="16" viewBox="0 0 12 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 3.5 L2 8 L5 12.5 M7 3.5 L10 8 L7 12.5"/></svg>
          </span>
        </div>

        <!-- ⑤ 右侧面板：引擎实时渲染 -->
        <section class="right">
          <div class="preview-box">
            <img id="preview" alt="渲染预览" />
            <div class="placeholder">预览区 — 选择图片并点击「开始渲染」</div>
          </div>
          <div id="status" class="status">就绪。请选择一张本地图片。</div>
        </section>
      </div>
    </main>
  </body>
</html>
